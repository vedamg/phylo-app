<!DOCTYPE html>
<html>
<head>
    <title>PhyloTree App</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f5f5f5;
        }

        textarea {
            width: 100%;
            height: 150px;
            margin-bottom: 10px;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background: #0056b3;
        }

        #output {
            margin-top: 20px;
            padding: 10px;
            background: white;
            border-radius: 5px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<h2>Phylogenetic Tree App</h2>

<textarea id="fastaInput">
>seq1
MKTAYIAKQRQISFVKSHFSRQDILDLWIYHTQGYFPDWQNY
>seq2
MKTAYIAKQRQISFVKSHFSRQDILDLWIYHTQGYFPDWQNA
</textarea>

<br>

<button onclick="runFullPipeline()">Run Analysis</button>
<button onclick="runSimilarity()">Similarity</button>

<div id="output"></div>

<script>

async function saveFasta() {
    let data = document.getElementById("fastaInput").value;

    let encoded = encodeURIComponent(data);

    let res = await fetch(`/api/fasta?data=${encoded}`);
    return await res.text();
}

async function runFullPipeline() {
    try {
        document.getElementById("output").innerText = "Running...";

        await saveFasta();

        let alignRes = await fetch("/api/align");
        let alignText = await alignRes.text();

        if (!alignText.includes("SUCCESS")) {
            document.getElementById("output").innerText = alignText;
            return;
        }

        let treeRes = await fetch("/api/tree");
        let tree = await treeRes.text();

        document.getElementById("output").innerText = tree;

    } catch (err) {
        console.error(err);
        document.getElementById("output").innerText = "Error running analysis";
    }
}

async function runSimilarity() {
    try {
        document.getElementById("output").innerText = "Running similarity...";

        await saveFasta();

        let alignRes = await fetch("/api/align");
        let alignText = await alignRes.text();

        if (!alignText.includes("SUCCESS")) {
            document.getElementById("output").innerText = alignText;
            return;
        }

        let treeRes = await fetch("/api/tree");
        let tree = await treeRes.text();

        document.getElementById("output").innerText =
            "Similarity (via phylogenetic tree):\n\n" + tree;

    } catch (err) {
        console.error(err);
        document.getElementById("output").innerText = "Similarity failed";
    }
}

</script>

</body>
</html>
