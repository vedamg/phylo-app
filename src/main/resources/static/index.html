<!DOCTYPE html>
<html>
<head>
    <title>PhyloTree App</title>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f5f5f5;
        }

        textarea {
            width: 100%;
            height: 150px;
            margin-bottom: 10px;
        }

        select, button {
            padding: 10px;
            margin: 5px;
        }

        #output {
            margin-top: 20px;
            padding: 10px;
            background: white;
            white-space: pre-wrap;
        }

        svg {
            margin-top: 20px;
            background: white;
        }
    </style>
</head>
<body>

<h2>PhyloTree App</h2>

<textarea id="fastaInput">
>seq1
MKTAYIAKQRQISFVKSHFSRQDILDLWIYHTQGYFPDWQNY
>seq2
MKTAYIAKQRQISFVKSHFSRQDILDLWIYHTQGYFPDWQNA
</textarea>

<br>

<label>Alignment Method:</label>
<select id="tool">
    <option value="mafft">MAFFT</option>
    <option value="muscle">MUSCLE</option>
</select>

<button onclick="runAnalysis()">Run</button>

<div id="output"></div>
<svg id="tree" width="800" height="400"></svg>

<script>

const BASE = window.location.origin;

async function runAnalysis() {
    const out = document.getElementById("output");
    out.innerText = "Running...";

    let data = document.getElementById("fastaInput").value;
    let tool = document.getElementById("tool").value;
    let encoded = encodeURIComponent(data);

    await fetch(`${BASE}/api/fasta?data=${encoded}`);

    let alignRes = await fetch(`${BASE}/api/align?tool=${tool}`);
    let alignText = await alignRes.text();

    if (!alignText.includes("SUCCESS")) {
        out.innerText = alignText;
        return;
    }

    let treeRes = await fetch(`${BASE}/api/tree`);
    let tree = await treeRes.text();

    out.innerText = tree;
    drawTree(tree);
}

// 🔥 TREE WITH FIXED COLOR PROPAGATION
function drawTree(newick) {

    d3.select("#tree").selectAll("*").remove();

    const svg = d3.select("#tree");
    const width = 800, height = 400;

    const root = d3.hierarchy(parseNewick(newick));
    const treeLayout = d3.tree().size([height, width - 150]);

    treeLayout(root);

    const g = svg.append("g").attr("transform", "translate(50,0)");

    const colorScale = d3.scaleOrdinal(d3.schemeCategory10);

    // Assign color to each top-level branch
    if (root.children) {
        root.children.forEach((child, i) => {
            assignColor(child, colorScale(i));
        });
    }

    function assignColor(node, color) {
        node.data.color = color;
        if (node.children) {
            node.children.forEach(c => assignColor(c, color));
        }
    }

    // links (FIXED: correct color usage)
    g.selectAll("line")
        .data(root.links())
        .enter()
        .append("line")
        .attr("x1", d => d.source.y)
        .attr("y1", d => d.source.x)
        .attr("x2", d => d.target.y)
        .attr("y2", d => d.target.x)
        .attr("stroke", d => d.target.data.color || "#999")
        .attr("stroke-width", 2);

    // nodes
    g.selectAll("circle")
        .data(root.descendants())
        .enter()
        .append("circle")
        .attr("cx", d => d.y)
        .attr("cy", d => d.x)
        .attr("r", 4)
        .attr("fill", "black");

    // labels
    g.selectAll("text")
        .data(root.descendants())
        .enter()
        .append("text")
        .attr("x", d => d.y + 6)
        .attr("y", d => d.x + 3)
        .text(d => d.data.name || "")
        .style("font-size", "10px");
}

// 🔥 NEWICK PARSER
function parseNewick(s) {
    let ancestors = [];
    let tree = {};
    let tokens = s.split(/\s*(;|\(|\)|,|:)\s*/);

    for (let i = 0; i < tokens.length; i++) {
        let token = tokens[i];

        switch (token) {
            case '(':
                let subtree = {};
                tree.children = [subtree];
                ancestors.push(tree);
                tree = subtree;
                break;

            case ',':
                let sibling = {};
                ancestors[ancestors.length - 1].children.push(sibling);
                tree = sibling;
                break;

            case ')':
                tree = ancestors.pop();
                break;

            case ':':
                break;

            default:
                if (tokens[i - 1] === ':') {
                    tree.length = parseFloat(token);
                } else {
                    tree.name = token;
                }
        }
    }

    return tree;
}

</script>

</body>
</html>
