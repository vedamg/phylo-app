<!DOCTYPE html>
<html>
<head>
    <title>PhyloTree App</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        textarea { width: 100%; height: 150px; margin-bottom: 10px; }
        button {
            padding: 10px 15px;
            margin: 5px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #output {
            margin-top: 20px;
            padding: 10px;
            background: white;
            border-radius: 5px;
            white-space: pre-wrap;
            min-height: 100px;
        }
    </style>
</head>
<body>

<h2>Phylogenetic Tree App</h2>

<textarea id="fastaInput">
>seq1
MKTAYIAKQRQISFVKSHFSRQDILDLWIYHTQGYFPDWQNY
>seq2
MKTAYIAKQRQISFVKSHFSRQDILDLWIYHTQGYFPDWQNA
</textarea>

<br>

<button onclick="runAnalysis()">Run Analysis</button>
<button onclick="runSimilarity()">Similarity</button>

<div id="output">Output will appear here...</div>

<script>

const BASE = window.location.origin;

async function runAnalysis() {
    try {
        const out = document.getElementById("output");
        out.innerText = "Running...";

        let data = document.getElementById("fastaInput").value;
        let encoded = encodeURIComponent(data);

        // save fasta
        await fetch(`${BASE}/api/fasta?data=${encoded}`);

        // align
        let alignRes = await fetch(`${BASE}/api/align`);
        let alignText = await alignRes.text();

        if (!alignText.includes("SUCCESS")) {
            out.innerText = "ALIGN ERROR:\n" + alignText;
            return;
        }

        // tree
        let treeRes = await fetch(`${BASE}/api/tree`);
        let tree = await treeRes.text();

        out.innerText = "TREE:\n\n" + tree;

    } catch (e) {
        console.error(e);
        document.getElementById("output").innerText = "ERROR: " + e;
    }
}

async function runSimilarity() {
    try {
        const out = document.getElementById("output");
        out.innerText = "Running similarity...";

        let data = document.getElementById("fastaInput").value;
        let encoded = encodeURIComponent(data);

        await fetch(`${BASE}/api/fasta?data=${encoded}`);
        await fetch(`${BASE}/api/align`);

        let treeRes = await fetch(`${BASE}/api/tree`);
        let tree = await treeRes.text();

        out.innerText = "SIMILARITY (tree-based):\n\n" + tree;

    } catch (e) {
        console.error(e);
        document.getElementById("output").innerText = "ERROR: " + e;
    }
}

</script>

</body>
</html>
