<!DOCTYPE html>
<html>
<head>
    <title>PhyloTree App</title>

    <!-- Tree library -->
    <script src="https://cdn.jsdelivr.net/npm/phylotree@1.0.0/phylotree.js"></script>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f5f5f5;
        }

        textarea {
            width: 100%;
            height: 150px;
            margin-bottom: 10px;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }

        #output {
            margin-top: 20px;
            padding: 10px;
            background: white;
            border-radius: 5px;
        }

        #tree {
            margin-top: 20px;
            background: white;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<h2>Phylogenetic Tree App</h2>

<textarea id="fastaInput">
>seq1
MKTAYIAKQRQISFVKSHFSRQDILDLWIYHTQGYFPDWQNY
>seq2
MKTAYIAKQRQISFVKSHFSRQDILDLWIYHTQGYFPDWQNA
>seq3
MKTAYIAKQRQISFVKSHFSRQDILDLWIYHTQGYFPDWQNV
>seq4
MKTAYIAKQRQISFVKSHFSRQDILDLWIYHTQGYFPDWQNK
</textarea>

<br>

<button onclick="runFullPipeline()">Run Analysis</button>
<button onclick="runSimilarity()">Similarity</button>

<div id="output"></div>
<div id="tree"></div>

<script>

const BASE = window.location.origin;

async function saveFasta() {
    let data = document.getElementById("fastaInput").value;
    let encoded = encodeURIComponent(data);
    await fetch(`${BASE}/api/fasta?data=${encoded}`);
}

async function runFullPipeline() {
    try {
        document.getElementById("output").innerText = "Running...";
        document.getElementById("tree").innerHTML = "";

        await saveFasta();

        let alignRes = await fetch(`${BASE}/api/align`);
        let alignText = await alignRes.text();

        if (!alignText.includes("SUCCESS")) {
            document.getElementById("output").innerText = alignText;
            return;
        }

        let treeRes = await fetch(`${BASE}/api/tree`);
        let newick = await treeRes.text();

        renderTree(newick);
        document.getElementById("output").innerText = newick;

    } catch (err) {
        console.error(err);
        document.getElementById("output").innerText = "Error running analysis";
    }
}

async function runSimilarity() {
    try {
        document.getElementById("output").innerText = "Running similarity...";
        document.getElementById("tree").innerHTML = "";

        await saveFasta();
        await fetch(`${BASE}/api/align`);

        let treeRes = await fetch(`${BASE}/api/tree`);
        let newick = await treeRes.text();

        renderTree(newick);

        document.getElementById("output").innerText =
            "Similarity (tree-based):\n\n" + newick;

    } catch (err) {
        console.error(err);
        document.getElementById("output").innerText = "Similarity failed";
    }
}

// 🔥 TREE VISUALIZATION WITH COLORS
function renderTree(newick) {

    document.getElementById("tree").innerHTML = "";

    let tree = new phylotree.phylotree(newick);

    tree.style_edges(function(edge) {
        // assign random color per branch
        edge.style.stroke = getRandomColor();
        edge.style["stroke-width"] = 2;
    });

    tree.render("#tree");
}

// random color generator
function getRandomColor() {
    const colors = ["red","blue","green","purple","orange","brown","teal"];
    return colors[Math.floor(Math.random() * colors.length)];
}

</script>

</body>
</html>
